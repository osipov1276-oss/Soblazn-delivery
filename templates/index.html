<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#14120f">
  <title>SOBLAZN Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=10.0.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="#top" aria-label="SOBLAZN Delivery">
        <span class="brand-mark">S</span>
        <span class="brand-copy"><small>Семейное кафе</small><strong>SOBLAZN</strong></span>
      </a>
      <div class="header-actions">
        <button class="round-action" onclick="showFavorites()" aria-label="Избранное">♡</button>
        <button id="ordersTop" class="pill-action" onclick="showMyOrders()"><span>👤</span><span class="action-label">Мои заказы</span></button>
        <button id="cartTop" class="round-action cart-action" aria-label="Корзина"><span>🛒</span><b id="cartCount">0</b></button>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <div class="hero-content">
          <span class="hero-kicker">Доставка по Актау</span>
          <h1>Вкусное рядом.<br><em>Доставим горячим.</em></h1>
          <p>Любимые блюда семейного кафе SOBLAZN — домой, в офис или к друзьям.</p>
          <div class="hero-benefits"><span>⚡ Быстро</span><span>🔥 Горячее</span><span>🥟 С любовью</span></div>
        </div>
        <div class="hero-visual" aria-hidden="true"><div class="dish-orbit"><span>🥟</span></div><i>✦</i><i>✦</i></div>
      </section>

      <section class="search-panel">
        <label class="search-field"><span>⌕</span><input id="search" autocomplete="off" placeholder="Поиск по меню"></label>
      </section>

      <section class="menu-heading">
        <div><span>Выберите, что хочется сегодня</span><h2>Наше меню</h2></div>
        <button class="favorites-link" onclick="showFavorites()">♡ Избранное</button>
      </section>

      <nav id="cats" class="categories" aria-label="Категории"></nav>
      <section id="products" class="products" aria-live="polite"></section>
    </main>
  </div>

  <aside id="cartBar" class="cartbar hidden">
    <div class="cartbar-summary"><span>🛍️</span><div><b id="barCount"></b><small id="barTotal"></small></div></div>
    <button onclick="openCart()">Открыть корзину <span>→</span></button>
  </aside>

  <div id="modal" class="modal hidden" onclick="event.target===this && closeModal()">
    <section class="sheet"><div class="sheet-handle"></div><button class="close" onclick="closeModal()" aria-label="Закрыть">×</button><div id="modalBody"></div></section>
  </div>

  <script src="/static/app.js?v=10.0.0"></script>
</body>
</html>
