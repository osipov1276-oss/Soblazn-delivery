<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>SOBLAZN Delivery</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<header>
  <div>
    <small>Семейное кафе</small>
    <h1>SOBLAZN</h1>
  </div>
  <div class="header-buttons">
    <button id="ordersTop" onclick="showMyOrders()">👤 Мои заказы</button>
    <button id="cartTop">🛒 <span id="cartCount">0</span></button>
  </div>
</header>

<section class="hero">
  <h2>Что закажем сегодня?</h2>
  <p>Доставка любимых блюд прямо к вам</p>
  <input id="search" placeholder="🔍 Поиск по меню">
</section>

<nav id="cats"></nav>
<main id="products"></main>

<div id="cartBar" class="cartbar hidden">
  <div>
    <b id="barCount"></b>
    <small id="barTotal"></small>
  </div>
  <button onclick="openCart()">Открыть корзину</button>
</div>

<div id="modal" class="modal hidden">
  <div class="sheet">
    <button class="close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
